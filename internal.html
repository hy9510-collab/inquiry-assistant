<!DOCTYPE html><html lang="ko"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>의정활동 내부 — 정책지원관</title>
<style>
:root{--navy:#1f3864;--bg:#f4f6fa;--line:#dde3ee;--acc:#3d6cb9}
*{box-sizing:border-box}body{font-family:'Malgun Gothic','맑은 고딕',sans-serif;margin:0;background:var(--bg);color:#222}
header{background:var(--navy);color:#fff;padding:14px 24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap}
header h1{margin:0;font-size:19px}header .sub{font-size:11.5px;opacity:.8}
nav{display:flex;gap:4px;background:#fff;border-bottom:1px solid var(--line);padding:0 20px;overflow-x:auto}
nav .tab{padding:12px 18px;cursor:pointer;font-size:14px;border-bottom:3px solid transparent;white-space:nowrap}
nav .tab.on{border-color:var(--navy);color:var(--navy);font-weight:700}
.wrap{max-width:1250px;margin:0 auto;padding:20px}
.panel{background:#fff;border:1px solid var(--line);border-radius:12px;padding:18px}
.badge{display:inline-block;padding:2px 9px;border-radius:10px;font-size:11px;background:#eef2fa;color:var(--navy);white-space:nowrap}
.b-완료,.b-회신완료{background:#e2f2e5;color:#1a7a2e}.b-추진중,.b-처리중,.b-일부이행,.b-진행중{background:#fff3d6;color:#96660a}
.b-보류,.b-취소{background:#fde3e3;color:#a12626}.b-예정,.b-구상,.b-접수{background:#e8eefb;color:#2a4d8f}
.ctrl{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
select,input,button{padding:7px 10px;border:1px solid var(--line);border-radius:6px;font-size:13px;font-family:inherit}
button{background:var(--navy);color:#fff;border:none;cursor:pointer}
input.q{flex:1;min-width:160px}
table{width:100%;border-collapse:collapse;background:#fff;font-size:12.5px}
th{background:#e8edf7;color:var(--navy);padding:8px;border:1px solid var(--line);position:sticky;top:0}
td{padding:7px 8px;border:1px solid var(--line);vertical-align:top}td a{color:var(--acc)}
.tablebox{overflow:auto;max-height:62vh;border-radius:8px;border:1px solid var(--line)}
.kanban{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.kcol{background:#eef1f7;border-radius:10px;padding:10px;min-height:120px}
.kcol h4{margin:0 0 8px;font-size:12.5px;color:var(--navy);text-align:center}
.kcard{background:#fff;border:1px solid var(--line);border-radius:8px;padding:8px;margin-bottom:8px;font-size:12px}
.kcard .m{color:#889;font-size:11px}
.empty{padding:44px;text-align:center;color:#889;background:#fff;border:1px dashed var(--line);border-radius:10px}
.login{max-width:360px;margin:80px auto;background:#fff;border:1px solid var(--line);border-radius:12px;padding:28px;text-align:center}
.login h2{color:var(--navy);margin-top:0}.login input{width:100%;margin:8px 0}.login button{width:100%}
.err{color:#a12626;font-size:12px;min-height:16px}
footer{font-size:11px;color:#889;padding:16px 24px;text-align:center}footer a{color:#889}
@media(max-width:900px){.kanban{grid-template-columns:1fr 1fr}}
/* 공유(인쇄) 화면 */
.share{max-width:800px;margin:0 auto;background:#fff;padding:36px 28px;font-size:13px;line-height:1.6}
.share h1{text-align:center;color:var(--navy);font-size:22px;margin-bottom:2px}
.share .ssub{text-align:center;color:#555;font-size:12px;border-bottom:2px solid var(--navy);padding-bottom:10px;margin-bottom:18px}
.share h2{color:var(--navy);font-size:15px;border-left:4px solid var(--navy);padding-left:8px;margin:22px 0 8px}
.share table{font-size:12px}.share .none{color:#888;font-size:12px}
.stat{display:flex;gap:8px;margin:8px 0}.stat div{flex:1;text-align:center;background:#f2f5fb;border-radius:6px;padding:8px;font-size:12px}.stat b{display:block;font-size:18px;color:var(--navy)}
.sfoot{margin-top:28px;font-size:11px;color:#777;border-top:1px solid #ddd;padding-top:8px}
@media print{header,nav,.ctrl,footer{display:none!important}.wrap{padding:0;max-width:none}.share{padding:0}body{background:#fff}}
</style></head><body>
<header><div><h1>의정활동 내부</h1><div class="sub">경기도의회 문화체육관광위원회 ｜ 정책지원관 전용</div></div>
<div class="sub" id="stamp"></div></header>
<nav id="nav" style="display:none"></nav>
<div class="wrap" id="view">
  <div class="login" id="loginbox">
    <h2>내부 페이지</h2>
    <p style="font-size:12.5px;color:#556">민원·일정 등 내부 자료는 비밀번호 확인 후 열람할 수 있습니다.</p>
    <input type="password" id="pw" placeholder="비밀번호" onkeydown="if(event.key==='Enter')login()">
    <div class="err" id="err"></div>
    <button onclick="login()">열람</button>
  </div>
</div>
<footer><a href="index.html">공개 페이지로</a> ｜ 민원인 정보는 비식별 처리(이니셜·유형만)</footer>
<script>
let D=null, P=null, cur="민원";
const TABS=["민원","일정","보도","공유(인쇄)"];
const esc=s=>String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;");
const fmt=v=>/^https?:\/\//.test(v)?'<a href="'+esc(v)+'" target="_blank" rel="noopener">원문</a>':esc(v);
const badge=v=>v?'<span class="badge b-'+esc(v)+'">'+esc(v)+'</span>':"";
const members=()=>[...new Set([].concat(P?P["공약이행"].rows.map(r=>r[0]):[],P?P["의회활동"].rows.map(r=>r[0]):[],D["민원처리"].rows.map(r=>r[0]),D["보도홍보"].rows.map(r=>r[0])).filter(x=>x))];

async function login(){
  const pw=document.getElementById("pw").value;
  const r=await fetch("api/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({password:pw})});
  if(r.ok){init()}else{document.getElementById("err").textContent="비밀번호가 올바르지 않습니다."}
}
async function init(){
  const r=await fetch("api/internal-data");
  if(!r.ok){return}
  D=await r.json();
  try{P=await (await fetch("data/public.json")).json()}catch(e){P=null}
  document.getElementById("stamp").textContent="데이터 기준일 "+D["생성일"];
  document.getElementById("nav").style.display="";
  nav();render();
}
function nav(){document.getElementById("nav").innerHTML=TABS.map(t=>'<div class="tab'+(t===cur?' on':'')+'" onclick="go(\''+t+'\')">'+t+'</div>').join("")}
function go(t){cur=t;nav();render()}
function tbl(sheet,rows,badgeCol){
  const h=D[sheet].headers;
  if(!rows.length)return '<div class="empty">기록이 없습니다. 03_대장에 입력 → 변환 → 푸시하면 갱신됩니다.</div>';
  return '<div class="tablebox"><table><tr>'+h.map(x=>'<th>'+esc(x)+'</th>').join("")+'</tr>'+
    rows.map(r=>'<tr>'+r.map((v,i)=>'<td>'+(i===badgeCol?badge(v):fmt(v))+'</td>').join("")+'</tr>').join("")+'</table></div>';
}
function selFilter(id,rows,col){const e=document.getElementById(id);const v=e?e.value:"";return v?rows.filter(r=>r[col]===v):rows}
function qFilter(rows){const e=document.getElementById("q");const q=(e?e.value:"").toLowerCase();return q?rows.filter(r=>r.join(" ").toLowerCase().includes(q)):rows}
function ctrl(opts,extra){
  return '<div class="ctrl">'+opts.map(o=>'<select id="'+o.id+'" onchange="render()"><option value="">'+o.label+'</option>'+o.values.map(v=>'<option>'+esc(v)+'</option>').join("")+'</select>').join("")+(extra||'<input class="q" id="q" placeholder="검색…" oninput="render()">')+'</div>';
}
function keep(ids){const s={};ids.concat(["q","s_m","s_ym"]).forEach(i=>{const e=document.getElementById(i);if(e)s[i]=e.value});return s}
function restore(s){Object.entries(s).forEach(([i,v])=>{const e=document.getElementById(i);if(e)e.value=v})}

function complaints(){
  const st=["접수","검토","부서이송","처리중","회신완료"];
  let rows=qFilter(selFilter("f_m",D["민원처리"].rows,0));
  let h=ctrl([{id:"f_m",label:"전체 의원",values:members()}]);
  if(!rows.length)return h+'<div class="empty">민원 기록이 없습니다.</div>';
  h+='<div class="kanban">'+st.map(s=>'<div class="kcol"><h4>'+s+' ('+rows.filter(r=>r[6]===s).length+')</h4>'+
    rows.filter(r=>r[6]===s).map(r=>'<div class="kcard"><b>'+esc(r[3])+'</b> '+esc(r[2])+'<br>'+esc(r[4]).slice(0,60)+'<div class="m">'+esc(r[0])+' ｜ 접수 '+esc(r[1])+(r[5]?' ｜ '+esc(r[5]):'')+'</div></div>').join("")+'</div>').join("")+'</div>';
  return h;
}
function schedule(){
  let rows=qFilter(D["일정과제"].rows).sort((a,b)=>a[0].localeCompare(b[0]));
  return ctrl([])+tbl("일정과제",rows,6);
}
function press(){
  let rows=qFilter(selFilter("f_m",D["보도홍보"].rows,0)).sort((a,b)=>b[1].localeCompare(a[1]));
  return ctrl([{id:"f_m",label:"전체 의원",values:members()}])+tbl("보도홍보",rows,-1);
}
function share(){
  const ym=new Date().toISOString().slice(0,7);
  let h='<div class="ctrl"><select id="s_m" onchange="render()"><option value="">의원 선택</option>'+members().map(m=>'<option>'+esc(m)+'</option>').join("")+'</select>'+
    '<input type="month" id="s_ym" value="'+ym+'" onchange="render()"><button onclick="print()">인쇄 / PDF 저장</button></div>';
  const m=document.getElementById("s_m")?document.getElementById("s_m").value:"";
  const month=document.getElementById("s_ym")?document.getElementById("s_ym").value:ym;
  if(!m)return h+'<div class="empty">의원과 월을 선택하면 인쇄용 월간 리포트가 표시됩니다.</div>';
  const pub=P||{"공약이행":{rows:[]},"의회활동":{rows:[]}};
  const pick=(rows,dc)=>rows.filter(r=>r[0]===m&&String(r[dc]).startsWith(month));
  const pl=pub["공약이행"].rows.filter(r=>r[0]===m);
  const acts=pick(pub["의회활동"].rows,1).sort((a,b)=>a[1].localeCompare(b[1]));
  const mws=pick(D["민원처리"].rows,1);
  const prs=pick(D["보도홍보"].rows,1);
  const pending=D["민원처리"].rows.filter(r=>r[0]===m&&r[6]&&r[6]!=="회신완료").length;
  const nxt=D["일정과제"].rows.filter(r=>String(r[0]).slice(0,7)>month).sort((a,b)=>a[0].localeCompare(b[0])).slice(0,10);
  const stat={};["완료","일부이행","추진중","구상","보류"].forEach(s=>stat[s]=pl.filter(r=>r[7]===s).length);
  const T=(hd,rows,empty)=>rows.length?'<table><tr>'+hd.map(x=>'<th>'+x+'</th>').join("")+'</tr>'+rows.map(r=>'<tr>'+r.map(c=>'<td>'+fmt(c==null?"":c)+'</td>').join("")+'</tr>').join("")+'</table>':'<p class="none">'+empty+'</p>';
  return h+'<div class="share">'+
    '<h1>의정활동 월간 리포트</h1><div class="ssub">'+esc(m)+' 의원 ｜ '+esc(month)+' ｜ 작성: 정책지원관 ｜ 경기도의회 문화체육관광위원회</div>'+
    '<h2>1. 이달의 활동 요약</h2>'+T(["구분","건수","비고"],[["의회 활동",acts.length+"건",[...new Set(acts.map(r=>r[2]))].join(", ")||"-"],["민원","접수 "+mws.length+"건","누적 미처리 "+pending+"건"],["언론·홍보",prs.length+"건",prs.slice(0,3).map(r=>r[3]).join(", ")||"-"]],"")+
    '<h2>2. 공약 이행 현황</h2><div class="stat">'+["완료","일부이행","추진중","구상","보류"].map(s=>'<div><b>'+stat[s]+'</b>'+s+'</div>').join("")+'</div>'+
    T(["공약","상태","최근 추진내용 / 다음 조치"],pl.map(r=>[r[2],r[7],(r[8]||"-")+(r[9]?" / 다음: "+r[9]:"")]),"공약 기록 없음 — 선거공보 기준 입력 예정")+
    '<h2>3. 이달 민원 처리(비식별)</h2>'+T(["접수일","유형","내용 요지","상태"],mws.map(r=>[r[1],r[3],String(r[4]).slice(0,40),r[6]]),"이달 접수 민원 없음")+
    '<h2>4. 의회 활동 상세</h2>'+T(["일자","유형","제목·안건","원문"],acts.map(r=>[r[1],r[2],r[3],r[7]||"-"]),"이달 의회 활동 기록 없음")+
    '<h2>5. 다음 일정</h2>'+T(["일자","구분","내용"],nxt.map(r=>[r[0],r[1],r[2]]),"예정 일정 없음")+
    '<div class="sfoot">본 리포트는 의정활동대장 원본에서 생성되었습니다. ｜ 데이터 기준일 '+esc(D["생성일"])+'</div></div>';
}
function render(){
  const saved=keep(["f_m"]);
  document.getElementById("view").innerHTML={"민원":complaints,"일정":schedule,"보도":press,"공유(인쇄)":share}[cur]();
  restore(saved);
}
// 이미 로그인된 세션(쿠키)이면 바로 진입
fetch("api/internal-data").then(r=>{if(r.ok)init()});
</script>
</body></html>
