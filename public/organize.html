<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>자료정리 — 아무 자료나 정리해 문서로</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    .wrap2{max-width:820px;margin:0 auto;padding:24px 16px 64px}
    #drop{border:2px dashed #b9c4db;border-radius:12px;padding:30px;text-align:center;color:#5b6675;cursor:pointer;transition:.15s;background:#fff}
    #drop.over{background:#eef3fb;border-color:#1a3a6b;color:#1a3a6b}
    #flist{margin:10px 0 0;font-size:13px}
    #flist .f{padding:5px 0;color:#33415a;display:flex;align-items:center;gap:8px}
    #flist .f .x{color:#c0241a;cursor:pointer;text-decoration:none;font-weight:700}
    .fld{font-size:13px;color:#5b6675;font-weight:600;display:block;margin:14px 0 5px}
    #url{width:100%} #text{width:100%;height:120px;font-family:inherit;font-size:14px}
    .res{background:#fff;border:1px solid #dfe4ec;border-radius:12px;padding:16px 18px;margin-top:12px}
    .res .t{font-weight:700;color:#1a3a6b;font-size:15px}
    .res .m{font-size:12px;color:#7a8698;margin:3px 0 8px}
    .res ul{margin:6px 0;padding-left:18px;font-size:13.5px}
    .res .dls{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    .res .dls button{padding:9px 14px;font-size:13px}
    .res .dls button.rec{box-shadow:0 0 0 2px #f6c945 inset}
    .badge2{display:inline-block;background:#eef3fb;color:#1a3a6b;border-radius:10px;padding:2px 9px;font-size:11px;margin-left:6px}
    .err{background:#fdecea;border:1px solid #f5c2bd;color:#c0241a;padding:10px 14px;border-radius:9px;font-size:13px;margin-top:10px;white-space:pre-wrap}
    #spin{display:none;text-align:center;color:#5b6675;padding:14px;font-size:14px}
    .warn2{background:#fff8e1;border:1px solid #f3e0a8;color:#7a5a10;padding:10px 14px;border-radius:9px;font-size:13px;margin-top:12px}
  </style>
</head>
<body>
  <div class="wrap2">
    <header class="topbar">
      <div class="brand">경기도의회 문화체육관광위원회 ｜ 정책지원관</div>
      <h1>자료정리</h1>
      <p class="sub">파일·링크·텍스트를 넣으면 AI가 정리해 한글(hwpx)·엑셀·PPT·PDF로 만들어 드립니다.</p>
    </header>

    <div class="toolbar">
      <span class="lock">🔒 비밀번호로 보호되는 페이지</span>
      <span class="row" style="gap:8px">
        <button class="ghost" onclick="location.href='/'">← 질의서·보고서 작성으로</button>
      </span>
    </div>

    <div class="card">
      <div class="card-head"><span class="badge">1</span><h2>자료 넣기</h2></div>
      <div id="drop">📎 파일을 끌어다 놓거나 클릭해서 선택<br>
        <small style="color:#7a8698">hwpx · 엑셀 · pptx · docx · pdf · txt · 이미지 (한 파일 4MB 이하)</small>
      </div>
      <input id="file" type="file" multiple hidden />
      <div id="flist"></div>
      <label class="fld">링크(웹페이지 주소) — 선택</label>
      <input id="url" type="text" placeholder="https://www.ggc.go.kr/..." />
      <label class="fld">직접 입력(정리할 원문) — 선택</label>
      <textarea id="text" placeholder="회의 내용, 기사 본문 등 정리할 원문을 붙여넣기…"></textarea>
    </div>

    <div class="card">
      <div class="card-head"><span class="badge">2</span><h2>정리 요청</h2></div>
      <label class="fld">요청사항 — 어떻게 정리할지 (선택)</label>
      <input id="note" type="text" style="width:100%" placeholder="예: 3줄로 요약 / 표 위주로 / 핵심 쟁점만 / 발표용으로" />
      <div class="row" style="margin-top:14px">
        <button id="go" class="primary-lg" onclick="run()">정리하기 →</button>
      </div>
      <div class="warn2" id="nokey" hidden>⚠ 서버에 AI 키(GEMINI_API_KEY)가 설정되지 않았습니다. 관리자에게 문의하세요.</div>
    </div>

    <div id="spin">⏳ AI가 정리하는 중입니다… (자료 양에 따라 10~40초)</div>
    <div id="out"></div>
  </div>

  <div id="toast" class="toast" hidden></div>

  <script>
    const $ = (s) => document.querySelector(s);
    const esc = (s) => String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    let picked = [];
    let docs = {}; // idx → doc

    const drop = $("#drop"), fileInput = $("#file");
    drop.onclick = () => fileInput.click();
    fileInput.onchange = (e) => { addFiles(e.target.files); fileInput.value = ""; };
    ["dragover", "dragenter"].forEach((ev) => drop.addEventListener(ev, (e) => { e.preventDefault(); drop.classList.add("over"); }));
    ["dragleave", "drop"].forEach((ev) => drop.addEventListener(ev, (e) => { e.preventDefault(); drop.classList.remove("over"); }));
    drop.addEventListener("drop", (e) => addFiles(e.dataTransfer.files));
    function addFiles(fl) { for (const f of fl) picked.push(f); renderFiles(); }
    function renderFiles() {
      $("#flist").innerHTML = picked.map((f, i) =>
        `<div class="f">📄 ${esc(f.name)} <span class="badge2">${(f.size/1024)|0} KB</span>` +
        `<a class="x" onclick="rmFile(${i});return false" href="#">✕</a></div>`).join("");
    }
    function rmFile(i) { picked.splice(i, 1); renderFiles(); }

    function toast(msg) { const t = $("#toast"); t.textContent = msg; t.hidden = false; setTimeout(() => (t.hidden = true), 3500); }

    async function organizeOne(source) {
      const note = $("#note").value;
      let res;
      if (source.file) {
        res = await fetch(`/api/organize?name=${encodeURIComponent(source.file.name)}&note=${encodeURIComponent(note)}`,
          { method: "POST", body: source.file });
      } else {
        res = await fetch("/api/organize", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ url: source.url, text: source.text, note }),
        });
      }
      const j = await res.json().catch(() => ({ error: "응답을 읽지 못했습니다." }));
      if (!res.ok) throw new Error(j.error || "정리 실패");
      return j.doc;
    }

    async function run() {
      const sources = [];
      picked.forEach((f) => sources.push({ file: f, label: f.name }));
      if ($("#url").value.trim()) sources.push({ url: $("#url").value.trim(), label: $("#url").value.trim() });
      if ($("#text").value.trim()) sources.push({ text: $("#text").value.trim(), label: "메모" });
      if (!sources.length) { toast("파일·링크·텍스트 중 하나를 넣어주세요."); return; }

      $("#go").disabled = true; $("#spin").style.display = "block"; $("#out").innerHTML = ""; docs = {};
      let idx = 0;
      for (const src of sources) {
        const i = idx++;
        try {
          const doc = await organizeOne(src);
          docs[i] = doc;
          renderResult(i, src.label, doc);
        } catch (e) {
          $("#out").insertAdjacentHTML("beforeend", `<div class="err">${esc(src.label)}: ${esc(e.message)}</div>`);
          if (/NO_KEY|GEMINI_API_KEY/.test(e.message)) $("#nokey").hidden = false;
        }
      }
      $("#go").disabled = false; $("#spin").style.display = "none";
      if (!Object.keys(docs).length && !$("#out").innerHTML) $("#out").innerHTML = `<div class="err">결과가 없습니다.</div>`;
    }

    const FMTS = [["hwpx", "한글 hwpx"], ["xlsx", "엑셀"], ["pptx", "PPT"], ["pdf", "PDF"]];
    function renderResult(i, label, doc) {
      const rec = doc.추천형식 || "hwpx";
      const btns = FMTS.map(([f, name]) =>
        `<button class="${f === rec ? "rec" : "ghost"}" onclick="download(${i}, '${f}')">⬇ ${name}${f === rec ? " ★" : ""}</button>`).join("");
      const html =
        `<div class="res"><div class="t">${esc(doc.제목)}` +
        (doc.성격 ? `<span class="badge2">${esc(doc.성격)}</span>` : "") + `</div>` +
        `<div class="m">출처: ${esc(label)} ｜ 추천형식: ${esc(rec)} ｜ 섹션 ${(doc.섹션 || []).length}개</div>` +
        ((doc.요약 || []).length ? `<ul>${doc.요약.map((s) => `<li>${esc(s)}</li>`).join("")}</ul>` : "") +
        `<div class="dls">${btns}</div></div>`;
      $("#out").insertAdjacentHTML("beforeend", html);
    }

    async function download(i, format) {
      const doc = docs[i];
      if (!doc) return;
      try {
        const res = await fetch("/api/make", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ doc, format }),
        });
        if (!res.ok) { const j = await res.json().catch(() => ({})); toast(j.error || "생성 실패"); return; }
        const blob = await res.blob();
        const cd = res.headers.get("Content-Disposition") || "";
        const m = cd.match(/filename\*=UTF-8''([^;]+)/);
        const name = m ? decodeURIComponent(m[1]) : `정리결과.${format}`;
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob); a.download = name; a.click();
        setTimeout(() => URL.revokeObjectURL(a.href), 1000);
      } catch (e) { toast("다운로드 실패: " + e.message); }
    }
  </script>
</body>
</html>
